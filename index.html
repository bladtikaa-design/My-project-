<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
margin:0;
}

#top{
background:white;
padding:10px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.delete{
position:absolute;
top:5px;
right:5px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.dark{
background:#111;
color:white;
}

.dark .post{
background:#1e1e1e;
}

#profile{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000aa;
display:none;
align-items:center;
justify-content:center;
}

#profileBox{
background:white;
padding:20px;
border-radius:15px;
}

#chat{
position:fixed;
bottom:0;
right:0;
width:300px;
height:400px;
background:white;
border-radius:10px 10px 0 0;
display:none;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

#callpopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#1e88ff;
color:white;
padding:15px;
border-radius:10px;
display:none;
}

.online{color:green}
.offline{color:gray}

</style>
</head>

<body>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">

<img id="myavatar" class="avatar">
<b id="user"></b>

<button onclick="theme()">🌙</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>

<div id="profile">

<div id="profileBox">

<img id="pavatar" class="avatar"><br><br>
<b id="pname"></b><br>
<span id="pstatus"></span><br><br>

<button onclick="openChat()">Direct Messages</button>
<button onclick="callUser()">Call</button><br><br>

<button onclick="closeProfile()">Close</button>

</div>

</div>

<div id="chat">

<div id="messages"></div>

<input id="msg" placeholder="message">
<button onclick="sendMsg()">Send</button>

</div>

<div id="callpopup">

<b id="caller"></b> calling...

<br><br>

<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, query, where, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAE46eiz4XltTwoPz4mVFG6kvPqAIhVf10",
authDomain:"mysocial-dabdf.firebaseapp.com",
projectId:"mysocial-dabdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

let targetUser=""

if(username){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

setDoc(doc(db,"online",username),{online:true})

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]
let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}

window.post=async function(){

let text=document.getElementById("text").value
let photoFile=document.getElementById("photo").files[0]

if(photoFile){

let reader=new FileReader()

reader.onload=async function(){

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:text,
photo:reader.result,
like:0
})

}

reader.readAsDataURL(photoFile)

}else{

await addDoc(collection(db,"posts"),{
user:username,
avatar:avatar,
text:text,
photo:"",
like:0
})

}

}

onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let img=""

if(data.photo){

img="<br><img class='postimg' src='"+data.photo+"'>"

}

let div=document.createElement("div")
div.className="post"

div.innerHTML=

"<img onclick='openProfile(\""+data.user+"\",\""+data.avatar+"\")' class='avatar' src='"+data.avatar+"'> <b>"+data.user+"</b><br>"+

data.text+

img+

"<br><button onclick='like(\""+docSnap.id+"\","+data.like+")'>👍 "+data.like+"</button>"

document.getElementById("posts").prepend(div)

})

})

window.like=async function(id,count){

await updateDoc(doc(db,"posts",id),{like:count+1})

}

window.theme=function(){

document.body.classList.toggle("dark")

}

window.openProfile=function(name,av){

targetUser=name

document.getElementById("profile").style.display="flex"
document.getElementById("pname").innerText=name
document.getElementById("pavatar").src=av

const q=query(collection(db,"online"),where("__name__","==",name))

onSnapshot(q,(s)=>{

if(s.empty){

document.getElementById("pstatus").innerHTML="<span class='offline'>offline</span>"

}else{

document.getElementById("pstatus").innerHTML="<span class='online'>online</span>"

}

})

}

window.closeProfile=function(){

document.getElementById("profile").style.display="none"

}

window.openChat=function(){

document.getElementById("chat").style.display="flex"

const q=query(collection(db,"messages"),where("room","==",username+"_"+targetUser))

onSnapshot(q,(snap)=>{

document.getElementById("messages").innerHTML=""

snap.forEach(d=>{

let m=d.data()

document.getElementById("messages").innerHTML+=
"<div><b>"+m.user+":</b> "+m.text+"</div>"

})

})

}

window.sendMsg=async function(){

let text=document.getElementById("msg").value

await addDoc(collection(db,"messages"),{
room:username+"_"+targetUser,
user:username,
text:text
})

}

window.callUser=async function(){

await addDoc(collection(db,"calls"),{
from:username,
to:targetUser
})

}

const incoming=query(collection(db,"calls"),where("to","==",username))

onSnapshot(incoming,(snap)=>{

snap.forEach(d=>{

let data=d.data()

document.getElementById("callpopup").style.display="block"
document.getElementById("caller").innerText=data.from

window.acceptCall=function(){

document.getElementById("callpopup").style.display="none"

}

window.rejectCall=async function(){

await deleteDoc(doc(db,"calls",d.id))
document.getElementById("callpopup").style.display="none"

}

})

})

</script>

</body>
</html>
