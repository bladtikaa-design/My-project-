<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>
<style>
body{
    font-family:sans-serif;
    background:#f0f0f0;
    text-align:center;
    margin:0;
}
#top{
    background:white;
    padding:10px;
}
.post{
    background:white;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    max-width:400px;
}
.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
}
.profileAvatar{
    width:90px;
    height:90px;
    border-radius:50%;
}
.comment{
    background:#eee;
    margin-top:5px;
    padding:5px;
    border-radius:5px;
    font-size:14px;
}
textarea{
    width:250px;
    height:60px;
}
input{
    width:250px;
    padding:5px;
}
button{
    padding:5px 10px;
    margin-top:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="login">
    <h2>Enter nickname</h2>
    <input id="nickname"><br><br>
    <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none">
    <div id="top">
        <b id="user"></b>
        <button onclick="openMyProfile()">My profile</button>
    </div>
    <br>
    <input id="text" placeholder="Write post">
    <button onclick="post()">Post</button>
    <div id="posts"></div>
</div>

<div id="profile" style="display:none">
    <br>
    <img src="https://i.imgur.com/4M34hi2.png" id="profileAvatar" class="profileAvatar"><br>
    <h2 id="profileName"></h2>
    <textarea id="bio" placeholder="Profile description"></textarea><br>
    <button onclick="saveBio()">Save</button>
    <h3>User posts</h3>
    <div id="profilePosts"></div>
    <br>
    <button onclick="back()">Back</button>
</div>

<script>
let username = localStorage.getItem("username");
let posts = JSON.parse(localStorage.getItem("posts") || "[]");
let bios = JSON.parse(localStorage.getItem("bios") || "{}");

if(username){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText=username;
    renderPosts();
}

function login(){
    username=document.getElementById("nickname").value;
    if(username=="") return;
    localStorage.setItem("username",username);
    location.reload();
}

function post(){
    let text=document.getElementById("text").value;
    if(text=="") return;
    posts.push({user:username,text:text,comments:[]});
    localStorage.setItem("posts",JSON.stringify(posts));
    document.getElementById("text").value="";
    renderPosts();
}

function renderPosts(){
    let container=document.getElementById("posts");
    container.innerHTML="";
    posts.slice().reverse().forEach((p,i)=>{
        let index=posts.length-1-i;
        let div=document.createElement("div");
        div.className="post";
        let commentsHTML="";
        p.comments.forEach(c=>{
            commentsHTML+="<div class='comment'><b>"+c.user+":</b> "+c.text+"</div>";
        });
        div.innerHTML=`
            <img src="https://i.imgur.com/4M34hi2.png" class="avatar" onclick="openProfile('${p.user}')">
            <b style="cursor:pointer" onclick="openProfile('${p.user}')">${p.user}</b>
            <p>${p.text}</p>
            <input placeholder="Comment">
            <button onclick="comment(this,${index})">Send</button>
            <div>${commentsHTML}</div>
        `;
        container.appendChild(div);
    });
}

function comment(btn,index){
    let input=btn.previousElementSibling;
    let text=input.value;
    if(text=="") return;
    posts[index].comments.push({user:username,text:text});
    localStorage.setItem("posts",JSON.stringify(posts));
    renderPosts();
}

function openProfile(user){
    document.getElementById("app").style.display="none";
    document.getElementById("profile").style.display="block";
    document.getElementById("profileName").innerText=user;
    document.getElementById("bio").value=bios[user]||"";
    let container=document.getElementById("profilePosts");
    container.innerHTML="";
    posts.forEach(p=>{
        if(p.user==user){
            let div=document.createElement("div");
            div.className="post";
            div.innerText=p.text;
            container.appendChild(div);
        }
    });
}

function openMyProfile(){
    openProfile(username);
}

function saveBio(){
    let text=document.getElementById("bio").value;
    let user=document.getElementById("profileName").innerText;
    bios[user]=text;
    localStorage.setItem("bios",JSON.stringify(bios));
}

function back(){
    document.getElementById("profile").style.display="none";
    document.getElementById("app").style.display="block";
}
</script>

</body>
</html>
