<!DOCTYPE html>
<html>
<head>
<title>My Social</title>

<style>
body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
}

.post{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
vertical-align:middle;
}

.reactions button{
margin:5px;
}
</style>

</head>
<body>

<div id="login">

<h2>Write your nickname</h2>

<input id="email" placeholder="Enter Gmail">
<br><br>

<button onclick="sendCode()">Send code</button>

<div id="codeBox" style="display:none">

<p id="showCode"></p>

<input id="codeInput" placeholder="Enter code">

<br><br>

<input id="nick" placeholder="Nickname">

<br><br>

<input type="file" id="avatar">

<br><br>

<button onclick="login()">Login</button>

</div>

</div>

<div id="app" style="display:none">

<h2 id="myNick"></h2>

<input id="text" placeholder="Write post">
<input type="file" id="photo">

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>

<script>

let code=""
let userNick=""
let userAvatar=""
let postsToday=0
let lastMessage=""

function sendCode(){

let email=document.getElementById("email").value

if(!email.endsWith("@gmail.com")){
alert("Only Gmail allowed")
return
}

code=Math.floor(1000+Math.random()*9000)

document.getElementById("showCode").innerText="Your code: "+code

document.getElementById("codeBox").style.display="block"

}

function login(){

let input=document.getElementById("codeInput").value

if(input!=code){
alert("Wrong code")
return
}

userNick=document.getElementById("nick").value

let file=document.getElementById("avatar").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){
userAvatar=e.target.result
startApp()
}

reader.readAsDataURL(file)

}else{
userAvatar=""
startApp()
}

}

function startApp(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("myNick").innerText="Hello "+userNick

}

function post(){

let text=document.getElementById("text").value

if(postsToday>=100){
alert("Limit 100 posts per day")
return
}

if(text==lastMessage){
alert("Same message wait 1 minute")
return
}

lastMessage=text
postsToday++

let div=document.createElement("div")
div.className="post"

let avatar=""

if(userAvatar){
avatar="<img class='avatar' src='"+userAvatar+"'> "
}

let photoFile=document.getElementById("photo").files[0]

let photoHTML=""

if(photoFile){

let reader=new FileReader()

reader.onload=function(e){

photoHTML="<br><img src='"+e.target.result+"' width='200'>"

createPost()

}

reader.readAsDataURL(photoFile)

}else{
createPost()
}

function createPost(){

div.innerHTML=
avatar+"<b>"+userNick+"</b><br>"+text+photoHTML+
"<div class='reactions'>"+
"<button onclick='react(this)'>👍</button>"+
"<button onclick='react(this)'>❤️</button>"+
"<button onclick='react(this)'>😂</button>"+
"</div>"

document.getElementById("posts").prepend(div)

}

}

function react(btn){

if(btn.classList.contains("used")) return

btn.classList.add("used")

let count=btn.getAttribute("data-count")||0

count++

btn.setAttribute("data-count",count)

btn.innerText=btn.innerText+" "+count

}

</script>

</body>
</html>
