<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
margin:0;
}

#top{
background:white;
padding:10px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.delete{
position:absolute;
top:5px;
right:5px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.dark{
background:#111;
color:white;
}

.dark .post{
background:#1e1e1e;
}

#profile{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
color:white;
padding:15px;
border-radius:10px;
display:none;
width:300px;
}

#messages{
height:120px;
overflow:auto;
background:#111;
padding:5px;
border-radius:5px;
}

.status{
font-size:12px;
}

.online{
color:#00ff66;
}

.offline{
color:#aaa;
}

#incoming{
display:none;
background:#333;
padding:10px;
border-radius:10px;
}

video{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">

<img id="myavatar" class="avatar">
<b id="user"></b>

<button onclick="theme()">🌙</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>

<div id="profile">

<b id="pname"></b>
<div id="pstatus" class="status"></div>

<br>

<button id="callBtn">📞 Call</button>

<br><br>

<div id="messages"></div>

<input id="msg" placeholder="message">
<button id="send">Send</button>

<br><br>

<div id="incoming">

<b id="caller"></b> calling

<br>

<button id="accept">Accept</button>
<button id="reject">Reject</button>

</div>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="closeProfile()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAE46eiz4XltTwoPz4mVFG6kvPqAIhVf10",
authDomain: "mysocial-dabdf.firebaseapp.com",
projectId: "mysocial-dabdf",
storageBucket: "mysocial-dabdf.firebasestorage.app",
messagingSenderId: "812073291348",
appId: "1:812073291348:web:e68dbf6c412c72de5aa7c1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

let activeUser=""

if(username){

afterLogin()

}

function afterLogin(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

setDoc(doc(db,"status",username),{online:true})

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]

let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

afterLogin()

}

reader.readAsDataURL(file)

}

window.post=async function(){

let text=document.getElementById("text").value

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
like:0

})

}

onSnapshot(collection(db,"posts"),(snap)=>{

document.getElementById("posts").innerHTML=""

snap.forEach((docSnap)=>{

let d=docSnap.data()

let div=document.createElement("div")

div.className="post"

div.innerHTML=

"<img class='avatar' src='"+d.avatar+"' onclick='openProfile(\""+d.user+"\")'> <b onclick='openProfile(\""+d.user+"\")'>"+d.user+"</b><br>"+

d.text+

"<br><button onclick='like(\""+docSnap.id+"\","+d.like+")'>👍 "+d.like+"</button>"

document.getElementById("posts").prepend(div)

})

})

window.like=async function(id,count){

await updateDoc(doc(db,"posts",id),{like:count+1})

}

window.openProfile=function(user){

activeUser=user

document.getElementById("profile").style.display="block"

document.getElementById("pname").innerText=user

const q=query(collection(db,"status"),where("__name__","==",user))

onSnapshot(q,(snap)=>{

snap.forEach((d)=>{

if(d.data().online){

document.getElementById("pstatus").innerHTML="🟢 online"

}else{

document.getElementById("pstatus").innerHTML="⚪ offline"

}

})

})

}

window.closeProfile=function(){

document.getElementById("profile").style.display="none"

}

document.getElementById("send").onclick=async()=>{

let txt=document.getElementById("msg").value

await addDoc(collection(db,"messages"),{

from:username,
to:activeUser,
text:txt

})

}

const msgQuery=query(collection(db,"messages"))

onSnapshot(msgQuery,(snap)=>{

let box=document.getElementById("messages")

box.innerHTML=""

snap.forEach((d)=>{

let m=d.data()

if((m.from==username&&m.to==activeUser)||(m.from==activeUser&&m.to==username)){

box.innerHTML+=m.from+": "+m.text+"<br>"

}

})

})

document.getElementById("callBtn").onclick=async()=>{

await addDoc(collection(db,"calls"),{

caller:username,
callee:activeUser,
status:"calling"

})

}

const callQuery=query(collection(db,"calls"),where("callee","==",username))

onSnapshot(callQuery,(snap)=>{

snap.forEach((d)=>{

let data=d.data()

if(data.status=="calling"){

document.getElementById("incoming").style.display="block"

document.getElementById("caller").innerText=data.caller

}

})

})

</script>

</body>
</html>
