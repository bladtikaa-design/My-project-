<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Social</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
text-align:center;
margin:0;
}

#top{
background:white;
padding:10px;
}

.post{
background:white;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
position:relative;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.postimg{
max-width:100%;
border-radius:10px;
margin-top:5px;
}

.delete{
position:absolute;
top:5px;
right:5px;
border:none;
background:red;
color:white;
border-radius:10px;
cursor:pointer;
}

.dark{
background:#111;
color:white;
}

.dark .post{
background:#1e1e1e;
}

#profile{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
display:none;
}

#callPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#1e90ff;
color:white;
padding:15px;
border-radius:10px;
display:none;
}

.online{
color:green;
}

.offline{
color:gray;
}

</style>
</head>

<body>

<div id="login">

<h2>Nickname</h2>

<input id="nickname"><br><br>
<input type="file" id="avatarInput"><br><br>

<button onclick="login()">Enter</button>

</div>

<div id="app" style="display:none">

<div id="top">

<img id="myavatar" class="avatar">
<b id="user"></b>

<button onclick="theme()">🌙</button>

</div>

<br>

<input id="text" placeholder="Write post"><br><br>
<input type="file" id="photo"><br><br>

<button onclick="post()">Post</button>

<div id="posts"></div>

</div>


<div id="profile">

<img id="pavatar" class="avatar"><br>
<b id="pname"></b><br>
<span id="status"></span>

<br><br>

<button onclick="startChat()">Direct Messages</button>
<button onclick="callUser()">📞 Call</button>

<br><br>

<button onclick="closeProfile()">Close</button>

</div>


<div id="callPopup">

<b id="caller"></b> calling...

<br><br>

<button onclick="acceptCall()">Accept</button>
<button onclick="declineCall()">Decline</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
onSnapshot,
updateDoc,
doc,
deleteDoc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAE46eiz4XltTwoPz4mVFG6kvPqAIhVf10",
authDomain: "mysocial-dabdf.firebaseapp.com",
projectId: "mysocial-dabdf",
storageBucket: "mysocial-dabdf.firebasestorage.app",
messagingSenderId: "812073291348",
appId: "1:812073291348:web:e68dbf6c412c72de5aa7c1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



let username=localStorage.getItem("username")
let avatar=localStorage.getItem("avatar")

if(username){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

document.getElementById("user").innerText=username
document.getElementById("myavatar").src=avatar

setDoc(doc(db,"users",username),{
avatar:avatar,
online:true
})

}

window.login=function(){

username=document.getElementById("nickname").value

let file=document.getElementById("avatarInput").files[0]

let reader=new FileReader()

reader.onload=function(){

avatar=reader.result

localStorage.setItem("username",username)
localStorage.setItem("avatar",avatar)

location.reload()

}

reader.readAsDataURL(file)

}



window.post=async function(){

let text=document.getElementById("text").value
let photoFile=document.getElementById("photo").files[0]
let photo=""

if(photoFile){

let reader=new FileReader()

reader.onload=async function(){

photo=reader.result

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:photo,
like:0

})

}

reader.readAsDataURL(photoFile)

}else{

await addDoc(collection(db,"posts"),{

user:username,
avatar:avatar,
text:text,
photo:"",
like:0

})

}

}



onSnapshot(collection(db,"posts"),(snapshot)=>{

document.getElementById("posts").innerHTML=""

snapshot.forEach((docSnap)=>{

let data=docSnap.data()

let div=document.createElement("div")
div.className="post"

let img=""

if(data.photo){

img="<img class='postimg' src='"+data.photo+"'>"

}

let del=""

if(data.user==username){

del="<button class='delete' onclick='delPost(\""+docSnap.id+"\")'>🗑</button>"

}

div.innerHTML=

del+

"<img class='avatar' onclick='openProfile(\""+data.user+"\",\""+data.avatar+"\")' src='"+data.avatar+"'> <b>"+data.user+"</b><br>"+

data.text+"<br>"+img+

"<br><button onclick='like(\""+docSnap.id+"\","+data.like+")'>👍 "+data.like+"</button>"

document.getElementById("posts").prepend(div)

})

})



window.like=async function(id,count){

let ref=doc(db,"posts",id)

await updateDoc(ref,{like:count+1})

}



window.delPost=async function(id){

await deleteDoc(doc(db,"posts",id))

}



window.theme=function(){

document.body.classList.toggle("dark")

}



let selectedUser=""



window.openProfile=async function(user,av){

selectedUser=user

document.getElementById("profile").style.display="block"

document.getElementById("pname").innerText=user
document.getElementById("pavatar").src=av

let snap=await getDoc(doc(db,"users",user))

if(snap.exists()){

if(snap.data().online){

document.getElementById("status").innerHTML="<span class='online'>● online</span>"

}else{

document.getElementById("status").innerHTML="<span class='offline'>● offline</span>"

}

}

}



window.closeProfile=function(){

document.getElementById("profile").style.display="none"

}



window.callUser=async function(){

await setDoc(doc(db,"calls",selectedUser),{

from:username

})

}



onSnapshot(doc(db,"calls",username),(snap)=>{

if(snap.exists()){

document.getElementById("callPopup").style.display="block"

document.getElementById("caller").innerText=snap.data().from

}

})



window.acceptCall=function(){

alert("Call started")

document.getElementById("callPopup").style.display="none"

deleteDoc(doc(db,"calls",username))

}



window.declineCall=function(){

document.getElementById("callPopup").style.display="none"

deleteDoc(doc(db,"calls",username))

}



window.startChat=function(){

alert("DM coming soon")

}



window.addEventListener("beforeunload",()=>{

setDoc(doc(db,"users",username),{

avatar:avatar,
online:false

})

})

</script>

</body>
</html>
